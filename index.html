<head>

            --md-sys-color-secondary: #4a6363;
            --md-sys-color-on-secondary: #ffffff;
            --md-sys-color-surface: #f9fafb;
            --md-sys-color-on-surface: #1b1c1e;
            --md-sys-color-surface-variant: #dde4e4;
            --md-sys-color-on-surface-variant: #414848;
            --md-sys-color-outline: #717878;
            --md-sys-color-shadow: #000000;
            --md-sys-color-surface-tint: #006a6a;
            --md-sys-color-inverse-surface: #2f3133;
            --md-sys-color-inverse-on-surface: #f0f1f3;
        }
        .dark-theme {
            --md-sys-color-primary: #4fd8d8;
            --md-sys-color-on-primary: #003737;
            --md-sys-color-primary-container: #004f4f;
            --md-sys-color-on-primary-container: #6ff7f7;
            --md-sys-color-secondary: #b1cbcb;
            --md-sys-color-on-secondary: #1b3535;
            --md-sys-color-surface: #121416;
            --md-sys-color-on-surface: #e2e3e5;
            --md-sys-color-surface-variant: #3f4949;
            --md-sys-color-on-surface-variant: #c0c9c9;
            --md-sys-color-outline: #8a9393;
            --md-sys-color-shadow: #000000;
            --md-sys-color-surface-tint: #4fd8d8;
            --md-sys-color-inverse-surface: #e2e3e5;
            --md-sys-color-inverse-on-surface: #1b1c1e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Roboto', system-ui, -apple-system, 'Segoe UI', sans-serif;
        }

        body {
            background: var(--md-sys-color-surface);
            color: var(--md-sys-color-on-surface);
            min-height: 100vh;
            padding: 1.5rem 1rem;

        .app {

        .header {

            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;

            overflow: hidden;

            align-items: center;
            gap: 0.4rem;
            cursor: pointer;
            color: var(--md-sys-color-primary);
            background: var(--md-sys-color-surface);
            padding: 0.4rem 1.2rem;
            border-radius: 32px;
            font-weight: 500;
            align-self: flex-start;

        #fileInput { display: none; }

        .custom-controls {
            display: none;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
            width: 100%;
        }
        .custom-controls.active {

        #fileName {

            max-width: 120px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;

        .icon-btn {
            background: var(--md-sys-color-surface);
            border: none;
            color: var(--md-sys-color-on-surface);

            height: 36px;
            border-radius: 50%;

            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .icon-btn.active {

            color: var(--md-sys-color-on-primary);
        }
        .custom-slider-container {
            flex: 1;
            height: 30px;
            display: flex;
            align-items: center;
            cursor: pointer;
            min-width: 80px;
        }
        .custom-slider-track {
            width: 100%;
            height: 10px;
            background: var(--md-sys-color-outline);
            border-radius: 20px;
            position: relative;
            overflow: hidden;
        }
        .custom-slider-fill {
            height: 100%;
            width: 60%;

            border-radius: 20px;
            pointer-events: none;

        .setting-item label {

            font-weight: 500;

            border: 1px solid var(--md-sys-color-outline);

            padding: 1rem 0.8rem 1rem 0.8rem;
            display: flex;
            flex-direction: column;

            position: absolute;
            left: 0;
            top: 8px;
            bottom: 8px;
            width: 6px;
            border-radius: 0 4px 4px 0;

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 0.5rem;

        .title-group {

            flex-direction: column;

            font-weight: 500;
            color: var(--md-sys-color-on-surface);

            background: var(--md-sys-color-surface);

            border-radius: 12px;
            align-self: flex-start;
            margin-top: 0.2rem;
            border: 1px solid var(--md-sys-color-outline);
            word-break: break-word;
            max-width: 100%;
        }

        .card-footer {
            display: flex;
            flex-wrap: wrap;
            align-items: flex-start;
            gap: 0.5rem;
            padding-left: 10px;
            margin-top: 0.2rem;
            min-width: 0;
        }

        .play-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--md-sys-color-surface);
            border: 2px solid var(--md-sys-color-outline);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--md-sys-color-on-surface-variant);
            font-size: 1rem;
            transition: 0.1s;
            flex-shrink: 0;
        }

        .play-btn.active {
            background: var(--md-sys-color-primary);
            border-color: var(--md-sys-color-primary);
            color: white;
        }

        .slider-container {
            flex: 1 1 120px;
            min-width: 60px;
            height: 30px;
            display: flex;
            align-items: center;
            cursor: pointer;
            position: relative;
            display: none;
        }

        .slider-container.active {
            display: flex;
        }

        .slider-track {
            width: 100%;
            height: 10px;
            background: var(--md-sys-color-outline);
            border-radius: 20px;
            position: relative;
            overflow: hidden;
        }

        .slider-fill {
            height: 100%;
            width: 0%;
            background: var(--md-sys-color-primary);
            border-radius: 20px;
            pointer-events: none;
        }

        .log-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .log-modal.active {
            display: flex;
        }
        .log-content {
            background: var(--md-sys-color-surface);
            border-radius: 28px;
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .log-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .log-header h3 {
            color: var(--md-sys-color-on-surface);
        }
        .close-btn {
            background: transparent;
            border: none;
            color: var(--md-sys-color-on-surface-variant);
            font-size: 1.5rem;
            cursor: pointer;
        }
        .log-list {
            overflow-y: auto;
            max-height: 60vh;
            padding: 0.5rem;
            background: var(--md-sys-color-surface-variant);
            border-radius: 16px;
        }
        .log-item {
            padding: 0.3rem 0;
            border-bottom: 1px solid var(--md-sys-color-outline);
            font-size: 0.85rem;
            color: var(--md-sys-color-on-surface);
            word-break: break-word;
        }
        .log-item:last-child {
            border-bottom: none;
        }

        footer {
            margin-top: 2rem;
            text-align: center;
            color: var(--md-sys-color-on-surface-variant);
            font-size: 0.8rem;
        }
    </style>
</head>
<body class="light-theme">
    <div class="app">
        <!-- 头部 -->
        <div class="header">
            <h1>星光环境Sound</h1>
            <div class="controls-bar">
                <div class="master-volume">
                    <label>主控</label>
                    <div class="master-slider-container" id="masterSliderContainer">
                        <div class="master-slider-track">
                            <div class="master-slider-fill" id="masterFill" style="width:50%"></div>
                        </div>
                    </div>
                    <span id="masterVal">50%</span>
                </div>
                <button id="startStopBtn">▶ 启动</button>
            </div>
        </div>

        <!-- 上传与设置两列 -->
        <div class="top-row">
            <div class="upload-section">
                <label class="upload-label" for="fileInput">
                    <span>📁</span> 上传音频
                </label>
                <input type="file" id="fileInput" accept=".mp3,.wav,.flac,audio/mpeg,audio/wav,audio/flac">
                <div class="custom-controls" id="customControls">
                    <span id="fileName">未选择</span>
                    <button class="icon-btn" id="playPauseCustom">▶️</button>
                    <div class="custom-slider-container" id="customSliderContainer">
                        <div class="custom-slider-track">
                            <div class="custom-slider-fill" id="customFill" style="width:60%"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="settings-section">
                <div class="setting-item">
                    <label>主题色</label>
                    <div class="hex-wrapper">
                        <span class="hex-prefix">#</span>
                        <input type="text" id="hexInput" placeholder="006a6a" value="006a6a" maxlength="6">
                    </div>
                </div>
                <div class="setting-item">
                    <label>列数</label>
                    <select id="columnSelect">
                        <option value="1">1列</option>
                        <option value="2" selected>2列</option>
                        <option value="3">3列</option>
                        <option value="4">4列</option>
                    </select>
                </div>
                <div class="setting-item">
                    <label>主题</label>

        <!-- 分类导航卡片 -->
        <div class="category-container">
            <div id="categoryNav" class="category-nav"></div>
        </div>

        <!-- 音轨网格 -->
        <div id="soundGrid" class="grid"></div>
        <footer>目前仍处于测试版阶段，可能有非常多的漏洞，并且声音的准确性也不是很高</footer>

        <!-- 日志模态框 -->
        <div id="logModal" class="log-modal">
            <div class="log-content">
                <div class="log-header">
                    <h3>操作日志</h3>
                    <button class="close-btn" id="closeLogBtn">&times;</button>
                </div>
                <div class="log-list" id="logList"></div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // 日志系统
            const activityLog = [];
            function logEvent(message, isError = false) {
                const time = new Date().toLocaleTimeString('zh-CN', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
                const entry = `[${time}] ${message}`;
                activityLog.push(entry);
                console.log(entry);
            }

            window.onerror = function(msg, url, line) {
                logEvent(`[全局错误] ${msg} at line ${line}`, true);
            };
            window.addEventListener('unhandledrejection', function(e) {
                logEvent(`[未处理Promise拒绝] ${e.reason}`, true);
            });

            // UI元素
            const startStopBtn = document.getElementById('startStopBtn');
            const masterSliderContainer = document.getElementById('masterSliderContainer');
            const masterFill = document.getElementById('masterFill');
            const masterVal = document.getElementById('masterVal');
            const grid = document.getElementById('soundGrid');
            const fileInput = document.getElementById('fileInput');
            const fileNameSpan = document.getElementById('fileName');
            const playPauseCustom = document.getElementById('playPauseCustom');
            const customSliderContainer = document.getElementById('customSliderContainer');
            const customFill = document.getElementById('customFill');
            const customControls = document.getElementById('customControls');
            const hexInput = document.getElementById('hexInput');
            const columnSelect = document.getElementById('columnSelect');
            const themeSelect = document.getElementById('themeSelect');
            const categoryNav = document.getElementById('categoryNav');
            const logBtn = document.getElementById('logBtn');
            const logModal = document.getElementById('logModal');
            const closeLogBtn = document.getElementById('closeLogBtn');
            const logList = document.getElementById('logList');

            themeSelect.addEventListener('change', (e) => {
                const theme = e.target.value;
                document.body.className = theme === 'light' ? 'light-theme' : 'dark-theme';
                logEvent(`主题切换为: ${theme}`);
            });

            logBtn.addEventListener('click', () => {
                logList.innerHTML = activityLog.map(msg => `<div class="log-item">${msg}</div>`).join('');
                logModal.classList.add('active');
            });
            closeLogBtn.addEventListener('click', () => logModal.classList.remove('active'));
            window.addEventListener('click', (e) => {
                if (e.target === logModal) logModal.classList.remove('active');
            });

            // 音频上下文
            let audioCtx = null;
            let masterGain = null;
            const activeSources = [];
            const activeGains = [];
            const activeFilters = [];
            const volumes = [];
            const isActive = [];

            let customBuffer = null;
            let customSource = null;
            let customGain = null;
            let customPlaying = false;
            let customArrayBuffer = null;

            // ---------- 512个手工命名声音 (与之前相同) ----------
            const soundNames = [
                "细雨微风", "暴雨倾盆", "海浪拍岸", "篝火噼啪", "森林晨雾", "山涧溪流", "风扇旋转", "空调外机",
                "雷声滚滚", "远雷低吟", "瀑布轰鸣", "壁炉柴火", "沙漠风沙", "冰川融化", "宇宙静电", "火车轨道",
                "咖啡厅人声", "办公室嗡嗡", "雪地行走", "落叶沙沙", "芦苇摇曳", "竹林风声", "潮汐涨落", "深海回响",
                "温泉气泡", "钟表滴答", "键盘敲击", "打印机工作", "吸尘器运转", "吹风机热风", "洗衣机旋转", "烘干机翻滚",
                "冰箱压缩机", "制冰机掉落", "空气净化器", "加湿器喷雾", "吊扇转动", "排气扇抽风", "油烟机轰鸣", "电钻冲击",
                "电锯切割", "破碎锤敲击", "挖掘机履带", "搅拌机混合", "发电机供电", "引擎怠速", "摩托车咆哮", "赛车疾驰",
                "轮胎摩擦", "刹车尖锐", "地铁进站", "地铁风噪", "火车站台", "飞机客舱", "直升机旋翼", "港口雾号",
                "船舶引擎", "码头波浪", "雨打屋顶", "雨打窗户", "雨打铁皮", "雨打树叶", "雨打帐篷", "雨打水面",

            // 增强的音频参数生成：使每个声音更独特、更准确
            function generateAudioParams(index) {
                // 使用更复杂的种子
                const seed = index * 7919 + 131071; // 质数混合
                const rand = (min, max) => {
                    const x = Math.sin(seed) * 10000;
                    return min + (x - Math.floor(x)) * (max - min);
                };

                // 噪声类型：白、粉、棕，根据声音类别倾向
                const typeRand = (seed * 23) % 100;
                let type;
                if (typeRand < 30) type = 'white';
                else if (typeRand < 70) type = 'pink';
                else type = 'brown';

                // 滤波器数量 1-4 个，增加多样性
                const numFilters = 1 + ((seed * 29) % 4);
                const filters = [];
                const filterTypes = ['lowpass', 'highpass', 'bandpass', 'notch', 'peaking', 'lowshelf', 'highshelf'];
                for (let f = 0; f < numFilters; f++) {
                    // 类型选择
                    const fType = filterTypes[(seed + f * 37) % filterTypes.length];
                    // 频率范围扩大，覆盖超低频到超高频
                    const freq = 15 + ((seed * 41 + f * 53) % 18000);
                    // Q值范围扩大
                    const Q = 0.2 + ((seed + f * 61) % 98) / 20; // 0.2-5.1
                    // 增益范围扩大
                    const gain = -12 + ((seed * 71 + f * 83) % 25); // -12 ~ +12 dB
                    filters.push({ type: fType, freq, Q, gain });
                }
                return { type, filters };
            }

            // 生成声音数据数组
            const soundData = soundNames.map((name, idx) => {
                const category = detectCategory(name);
                const { type, filters } = generateAudioParams(idx);
                return { name, category, type, filters };
            });

            const baseHues = soundData.map((_, i) => (i * 17) % 360);

            // Web Worker 生成噪声
            const workerBlob = new Blob([`
                self.onmessage = function(e) {
                    const { type, sampleRate, duration, index } = e.data;
                    const bufferSize = sampleRate * duration;
                    const data = new Float32Array(bufferSize);
                    if (type === 'white') {
                        for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
                    } else if (type === 'pink') {
                        let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;
                        for (let i = 0; i < bufferSize; i++) {
                            const w = Math.random()*2-1;
                            b0 = 0.99886*b0 + w*0.0555179;
                            b1 = 0.99332*b1 + w*0.0750759;
                            b2 = 0.96900*b2 + w*0.1538520;
                            b3 = 0.86650*b3 + w*0.3104856;
                            b4 = 0.55000*b4 + w*0.5329522;
                            b5 = -0.7616*b5 - w*0.0168980;
                            const pink = b0+b1+b2+b3+b4+b5+b6 + w*0.5362;
                            b6 = w*0.115926;
                            data[i] = pink * 0.11;
                        }
                    } else { // brown
                        let last = 0;
                        for (let i = 0; i < bufferSize; i++) {
                            const w = Math.random()*2-1;
                            last = (last + (0.02 * w)) / 1.02;
                            data[i] = last * 3;
                        }
                    }
                    self.postMessage({ data: data.buffer, index }, [data.buffer]);
                };
            `], { type: 'application/javascript' });
            const workerUrl = URL.createObjectURL(workerBlob);

            function generateNoiseBuffer(ctx, type, duration = 10.0) {
                return new Promise((resolve, reject) => {
                    const worker = new Worker(workerUrl);
                    worker.onmessage = (e) => {
                        const float32Array = new Float32Array(e.data.data);
                        const audioBuffer = ctx.createBuffer(1, float32Array.length, ctx.sampleRate);
                        audioBuffer.copyToChannel(float32Array, 0);
                        resolve(audioBuffer);
                        worker.terminate();
                    };
                    worker.onerror = reject;
                    worker.postMessage({ type, sampleRate: ctx.sampleRate, duration });
                });
            }

                if (customArrayBuffer && !customBuffer) {
                    try {
                        customBuffer = await audioCtx.decodeAudioData(customArrayBuffer.slice(0));
                        logEvent('上传音频解码成功');
                    } catch (err) {
                        logEvent(`上传音频解码失败: ${err}`, true);
                    }
                }
            }

            async function stopAudio() {
                if (!audioCtx) return;
                for (let i = 0; i < activeSources.length; i++) {
                    if (activeSources[i]) {
                        try { activeSources[i].stop(); } catch {}
                        activeSources[i] = null;
                        activeGains[i] = null;
                        activeFilters[i] = null;
                        isActive[i] = false;
                        const playBtn = document.querySelector(`.play-btn[data-index="${i}"]`);
                        if (playBtn) {
                            playBtn.classList.remove('active');
                            playBtn.textContent = '▶️';
                        }
                        const sliderContainer = document.querySelector(`.slider-container[data-index="${i}"]`);
                        if (sliderContainer) sliderContainer.classList.remove('active');
                    }
                }
                if (customSource) {
                    try { customSource.stop(); } catch {}
                    customSource = null;
                    customPlaying = false;
                    playPauseCustom.innerHTML = '▶️';
                    playPauseCustom.classList.remove('active');
                }
                await audioCtx.close();
                audioCtx = null;
                masterGain = null;
                startStopBtn.textContent = '▶ 启动';
                logEvent('音频引擎停止');
            }

            async function loadAndPlaySound(index) {
                if (!audioCtx) {
                    logEvent('尝试播放但引擎未启动', true);
                    return;
                }
                if (isActive[index]) return;

                const sound = soundData[index];
                const volume = volumes[index] || 0.5;

                try {
                    logEvent(`加载声音: ${sound.name}`);
                    const buffer = await generateNoiseBuffer(audioCtx, sound.type, 10.0);
                    const source = audioCtx.createBufferSource();
                    source.buffer = buffer;
                    source.loop = true;

                    let lastNode = source;
                    const filters = [];
                    if (sound.filters) {
                        for (let f of sound.filters) {
                            const filter = audioCtx.createBiquadFilter();
                            filter.type = f.type;
                            filter.frequency.value = f.freq || 1000;
                            if (f.Q) filter.Q.value = f.Q;
                            if (f.gain) filter.gain.value = f.gain;
                            lastNode.connect(filter);
                            lastNode = filter;
                            filters.push(filter);
                        }
                    }

                    const gainNode = audioCtx.createGain();
                    gainNode.gain.value = volume;
                    lastNode.connect(gainNode);
                    gainNode.connect(masterGain);

                    source.start(0);

                    activeSources[index] = source;
                    activeGains[index] = gainNode;
                    activeFilters[index] = filters;
                    isActive[index] = true;

                    const playBtn = document.querySelector(`.play-btn[data-index="${index}"]`);
                    const sliderContainer = document.querySelector(`.slider-container[data-index="${index}"]`);
                    if (playBtn) {
                        playBtn.classList.add('active');
                        playBtn.textContent = '⏸️';
                    }
                    if (sliderContainer) {
                        sliderContainer.classList.add('active');
                        const fill = sliderContainer.querySelector('.slider-fill');
                        fill.style.width = volume * 100 + '%';
                    }
                    logEvent(`声音启动: ${sound.name}`);
                } catch (err) {
                    logEvent(`加载声音失败 ${sound.name}: ${err}`, true);
                }
            }

            function stopSound(index) {
                if (!audioCtx || !isActive[index]) return;
                try {
                    if (activeSources[index]) {
                        activeSources[index].stop();
                        activeSources[index] = null;
                    }
                    activeGains[index] = null;
                    activeFilters[index] = null;
                    isActive[index] = false;
                    const playBtn = document.querySelector(`.play-btn[data-index="${index}"]`);
                    if (playBtn) {
                        playBtn.classList.remove('active');
                        playBtn.textContent = '▶️';
                    }
                    const sliderContainer = document.querySelector(`.slider-container[data-index="${index}"]`);
                    if (sliderContainer) sliderContainer.classList.remove('active');
                    logEvent(`关闭声音: ${soundData[index].name}`);
                } catch (err) {
                    logEvent(`关闭声音失败: ${err}`, true);
                }
            }

            function togglePower(index) {
                if (!audioCtx) {
                    logEvent('请先启动引擎', true);
                    return;
                }
                if (isActive[index]) {
                    stopSound(index);
                } else {
                    loadAndPlaySound(index);
                }
            }

            function setVolume(index, vol) {
                volumes[index] = vol;
                if (activeGains[index]) {
                    activeGains[index].gain.setValueAtTime(vol, audioCtx.currentTime);
                }
            }

            // 构建UI
            function buildCategoryNav() {
                const cats = [...new Set(soundData.map(item => item.category))].sort();
                categoryNav.innerHTML = '<button class="category-btn active" data-category="all">全部</button>';
                cats.forEach(cat => {
                    const btn = document.createElement('button');
                    btn.className = 'category-btn';
                    btn.dataset.category = cat;
                    btn.textContent = cat;
                    categoryNav.appendChild(btn);
                });

                categoryNav.querySelectorAll('.category-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        categoryNav.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        const selectedCat = btn.dataset.category;
                        filterGrid(selectedCat);
                        logEvent(`切换分类至: ${selectedCat}`);
                    });
                });
            }

            function filterGrid(category) {
                const cards = document.querySelectorAll('.card');
                cards.forEach((card, index) => {
                    const itemCat = soundData[index].category;
                    card.style.display = (category === 'all' || itemCat === category) ? '' : 'none';
                });
            }

            function buildGrid() {
                grid.innerHTML = '';
                soundData.forEach((item, idx) => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    const hue = baseHues[idx];
                    card.style.setProperty('--card-color', `hsl(${hue}, 80%, 55%)`);

                    const header = document.createElement('div');
                    header.className = 'card-header';
                    header.innerHTML = `
                        <div class="title-group">
                            <span>${item.name}</span>
                            <span class="category-tag">${item.category}</span>
                        </div>
                    `;

                    const footer = document.createElement('div');
                    footer.className = 'card-footer';

                    const playBtn = document.createElement('div');
                    playBtn.className = 'play-btn';
                    playBtn.dataset.index = idx;
                    playBtn.textContent = '▶️';
                    playBtn.addEventListener('click', (e) => togglePower(idx));

                    const sliderContainer = document.createElement('div');
                    sliderContainer.className = 'slider-container';
                    sliderContainer.dataset.index = idx;

                    const track = document.createElement('div');
                    track.className = 'slider-track';
                    const fill = document.createElement('div');
                    fill.className = 'slider-fill';
                    track.appendChild(fill);
                    sliderContainer.appendChild(track);

                    footer.appendChild(playBtn);
                    footer.appendChild(sliderContainer);

                    card.appendChild(header);
                    card.appendChild(footer);
                    grid.appendChild(card);

                    volumes[idx] = 0.5;
                });

                // 滑块拖动逻辑
                let activeDragIndex = null;
                let isDragging = false;

                function startDrag(e, idx) {
                    e.preventDefault();
                    const container = document.querySelector(`.slider-container[data-index="${idx}"]`);
                    if (!container || !container.classList.contains('active')) return;
                    activeDragIndex = idx;
                    isDragging = true;
                    updateVolumeFromEvent(e, idx);
                }

                function updateVolumeFromEvent(e, idx) {
                    const container = document.querySelector(`.slider-container[data-index="${idx}"]`);
                    if (!container) return;
                    const rect = container.querySelector('.slider-track').getBoundingClientRect();
                    let clientX;
                    if (e.type.startsWith('touch')) {
                        clientX = e.touches[0].clientX;
                    } else {
                        clientX = e.clientX;
                    }
                    let x = clientX - rect.left;
                    x = Math.max(0, Math.min(rect.width, x));
                    const percent = x / rect.width;
                    setVolume(idx, percent);
                    const fill = container.querySelector('.slider-fill');
                    fill.style.width = percent * 100 + '%';
                }

                function onDragMove(e) {
                    if (!isDragging || activeDragIndex === null) return;
                    e.preventDefault();
                    updateVolumeFromEvent(e, activeDragIndex);
                }

                function onDragEnd(e) {
                    if (isDragging) {
                        isDragging = false;
                        activeDragIndex = null;
                    }
                }

                document.querySelectorAll('.slider-container').forEach(container => {
                    container.addEventListener('mousedown', (e) => startDrag(e, container.dataset.index));
                    container.addEventListener('touchstart', (e) => startDrag(e, container.dataset.index), { passive: false });
                });

                document.addEventListener('mousemove', onDragMove);
                document.addEventListener('mouseup', onDragEnd);
                document.addEventListener('touchmove', onDragMove, { passive: false });
                document.addEventListener('touchend', onDragEnd);
                document.addEventListener('touchcancel', onDragEnd);
            }

            // 主音量拖动
            (function initMasterSlider() {
                let isDraggingMaster = false;
                masterSliderContainer.addEventListener('mousedown', startMasterDrag);
                masterSliderContainer.addEventListener('touchstart', startMasterDrag, { passive: false });

                function startMasterDrag(e) {
                    e.preventDefault();
                    isDraggingMaster = true;
                    updateMasterVolume(e);
                }

                function updateMasterVolume(e) {
                    const rect = masterSliderContainer.querySelector('.master-slider-track').getBoundingClientRect();
                    let clientX;
                    if (e.type.startsWith('touch')) {
                        clientX = e.touches[0].clientX;
                    } else {
                        clientX = e.clientX;
                    }
                    let x = clientX - rect.left;
                    x = Math.max(0, Math.min(rect.width, x));
                    const percent = x / rect.width;
                    masterFill.style.width = percent * 100 + '%';
                    masterVal.textContent = Math.round(percent * 100) + '%';
                    if (masterGain) {
                        masterGain.gain.setValueAtTime(percent, audioCtx.currentTime);
                    }
                }

                document.addEventListener('mousemove', (e) => {
                    if (isDraggingMaster) {
                        e.preventDefault();
                        updateMasterVolume(e);
                    }
                });
                document.addEventListener('touchmove', (e) => {
                    if (isDraggingMaster) {
                        e.preventDefault();
                        updateMasterVolume(e);
                    }
                }, { passive: false });
                document.addEventListener('mouseup', () => { isDraggingMaster = false; });
                document.addEventListener('touchend', () => { isDraggingMaster = false; });
                document.addEventListener('touchcancel', () => { isDraggingMaster = false; });
            })();

            // 自定义音量滑块
            (function initCustomSlider() {
                let isDraggingCustom = false;
                customSliderContainer.addEventListener('mousedown', startCustomDrag);
                customSliderContainer.addEventListener('touchstart', startCustomDrag, { passive: false });

                function startCustomDrag(e) {
                    e.preventDefault();
                    isDraggingCustom = true;
                    updateCustomVolume(e);
                }

                function updateCustomVolume(e) {
                    const rect = customSliderContainer.querySelector('.custom-slider-track').getBoundingClientRect();
                    let clientX;
                    if (e.type.startsWith('touch')) {
                        clientX = e.touches[0].clientX;
                    } else {
                        clientX = e.clientX;
                    }
                    let x = clientX - rect.left;
                    x = Math.max(0, Math.min(rect.width, x));
                    const percent = x / rect.width;
                    customFill.style.width = percent * 100 + '%';
                    if (customGain) {
                        customGain.gain.setValueAtTime(percent, audioCtx.currentTime);
                    }
                }

                document.addEventListener('mousemove', (e) => {
                    if (isDraggingCustom) {
                        e.preventDefault();
                        updateCustomVolume(e);
                    }
                });
                document.addEventListener('touchmove', (e) => {
                    if (isDraggingCustom) {
                        e.preventDefault();
                        updateCustomVolume(e);
                    }
                }, { passive: false });
                document.addEventListener('mouseup', () => { isDraggingCustom = false; });
                document.addEventListener('touchend', () => { isDraggingCustom = false; });
                document.addEventListener('touchcancel', () => { isDraggingCustom = false; });
            })();

            // 上传音频处理
            fileInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return;
                fileNameSpan.textContent = file.name;
                customControls.classList.add('active');
                playPauseCustom.innerHTML = '▶️';
                playPauseCustom.classList.remove('active');
                if (customSource) {
                    try { customSource.stop(); } catch {}
                    customSource = null;
                }
                customPlaying = false;
                customBuffer = null;
                logEvent(`上传文件: ${file.name}`);

                const reader = new FileReader();
                reader.onload = (ev) => {
                    const arrayBuffer = ev.target.result;
                    if (audioCtx) {
                        audioCtx.decodeAudioData(arrayBuffer).then(buffer => {
                            customBuffer = buffer;
                            logEvent('上传音频解码成功');
                        }).catch((err) => {
                            alert('解码失败，请检查文件格式');
                            logEvent(`解码错误: ${err}`, true);
                        });
                    } else {
                        customArrayBuffer = arrayBuffer;
                        logEvent('音频文件已缓存，启动引擎后将解码');
                    }
                };
                reader.readAsArrayBuffer(file);
            });

            playPauseCustom.addEventListener('click', async () => {
                if (!audioCtx) {
                    alert('请先启动引擎');
                    logEvent('播放失败: 引擎未启动', true);
                    return;
                }
                if (!customBuffer && customArrayBuffer) {
                    try {
                        customBuffer = await audioCtx.decodeAudioData(customArrayBuffer.slice(0));
                        logEvent('上传音频解码成功');
                    } catch (err) {
                        alert('解码失败');
                        logEvent(`解码错误: ${err}`, true);
                        return;
                    }
                }
                if (!customBuffer) {
                    alert('请先上传音频');
                    logEvent('播放失败: 无音频', true);
                    return;
                }
                if (customPlaying) {
                    if (customSource) {
                        customSource.stop();
                        customSource = null;
                    }
                    customPlaying = false;
                    playPauseCustom.innerHTML = '▶️';
                    playPauseCustom.classList.remove('active');
                    logEvent('暂停上传音频');
                } else {
                    if (customSource) {
                        try { customSource.stop(); } catch {}
                        customSource = null;
                    }
                    customSource = audioCtx.createBufferSource();
                    customSource.buffer = customBuffer;
                    customSource.loop = true;
                    if (!customGain) {
                        customGain = audioCtx.createGain();
                        customGain.gain.value = parseFloat(customFill.style.width) / 100 || 0.6;
                        customGain.connect(masterGain);
                    }
                    customSource.connect(customGain);
                    customSource.start(0);
                    customPlaying = true;
                    playPauseCustom.innerHTML = '⏸️';
                    playPauseCustom.classList.add('active');
                    logEvent('播放上传音频');
                }
            });

            // ---------- HEX输入框修复 ----------
            // 实时输入时只允许十六进制字符，并限制长度
            hexInput.addEventListener('input', (e) => {
                let val = e.target.value.replace(/[^0-9a-fA-F]/g, '').slice(0, 6);
                e.target.value = val;
                // 不在此处应用颜色，只做输入限制
            });

            // 当输入框失去焦点或按下回车时应用颜色
            function applyHexColor() {
                let val = hexInput.value.trim();
                if (val.length === 0) {
                    val = '006a6a'; // 默认
                } else if (val.length < 6) {
                    // 不足6位补0
                    val = val.padEnd(6, '0');
                }
                hexInput.value = val;
                const fullHex = '#' + val;
                document.documentElement.style.setProperty('--md-sys-color-primary', fullHex);
                logEvent(`主题色更改为: ${fullHex}`);
            }

            hexInput.addEventListener('blur', applyHexColor);
            hexInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    hexInput.blur(); // 触发blur事件
                }
            });

            // 初始化
            hexInput.value = '006a6a';
            document.documentElement.style.setProperty('--md-sys-color-primary', '#006a6a');

            columnSelect.addEventListener('change', (e) => {
                const cols = e.target.value;
                grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
                logEvent(`列数更改为: ${cols}`);
            });

            startStopBtn.addEventListener('click', () => {
                if (audioCtx) {
                    stopAudio();
                } else {
                    startAudio().catch((err) => {
                        alert('请先与页面交互');
                        logEvent(`启动失败: ${err}`, true);
                    });
                }
            });

            // 初始化
            buildCategoryNav();
            buildGrid();
            logEvent('页面初始化完成');
            window.addEventListener('beforeunload', () => { if (audioCtx) audioCtx.close(); });
        })();
    </script>
</body>
</html>
